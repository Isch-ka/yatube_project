{% load static %}
<nav class="navbar navbar-light" style="background-color: lightskyblue">
  <div class="container">
    <a class="navbar-brand" href="{% url 'posts:index' %}">
      <img src="{% static 'img/logo.png' %}" width="30" height="30" class="d-inline-block align-top" alt="">
      <span style="color:red">Ya</span>tube
    </a>
    
    <div class="d-flex align-items-center">
      <!-- Поиск по группам -->
      <form method="get" action="{% url 'posts:group_search' %}" class="d-flex me-3">
        <input type="text" name="q" class="form-control form-control-sm me-2" 
               placeholder="Поиск групп..." value="{{ search_query }}"
               style="width: 180px;">
        <button type="submit" class="btn btn-outline-primary btn-sm">
          <i class="bi bi-search"></i>
        </button>
      </form>
      
      <!-- Кнопка "Все группы" -->
      <a href="{% url 'posts:groups_list' %}" class="btn btn-outline-info btn-sm me-3">
        <i class="bi bi-people-fill"></i> Все группы
      </a>
      
      <!-- Авторизация и создание поста -->
      {% if user.is_authenticated %}
        <a href="{% url 'posts:post_create' %}" class="btn btn-success btn-sm me-3">
          <i class="bi bi-plus-circle"></i> Новый пост
        </a>
        <span class="navbar-text me-3">
          <span class="badge bg-success">{{ user.username }}</span>
        </span>
        <a href="{% url 'users:logout' %}" class="btn btn-outline-danger btn-sm me-2">
          Выйти
        </a>
      {% else %}
        <a href="{% url 'users:login' %}" class="btn btn-outline-primary btn-sm me-2">
          Войти
        </a>
        <a href="{% url 'users:signup' %}" class="btn btn-primary btn-sm">
          Регистрация
        </a>
      {% endif %}
      
      <!-- Счётчик постов -->
      <span class="navbar-text ms-3">
        {% if group %}
          <span class="badge bg-primary me-2">Группа: {{ group.title }}</span>
          <span class="badge bg-secondary">Постов: {{ total_posts }}</span>
        {% else %}
          <span class="badge bg-info me-2">Главная страница</span>
          <span class="badge bg-secondary">Всего постов: {{ total_posts }}</span>
        {% endif %}
      </span>
    </div>
  </div>
</nav>
