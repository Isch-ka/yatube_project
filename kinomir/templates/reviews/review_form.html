{% extends 'base.html' %}
{% block title %}{% if is_edit %}Редактировать{% else %}Новая{% endif %} рецензия{% endblock %}
{% block content %}
<h1>{% if is_edit %}Редактировать рецензию{% else %}Новая рецензия{% endif %}</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Сохранить</button>
</form>
{% endblock %}
